services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: freehold
      POSTGRES_PASSWORD: freehold
      POSTGRES_DB: freehold
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freehold -d freehold"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
