services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: marrow
      POSTGRES_PASSWORD: marrow
      POSTGRES_DB: marrow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marrow -d marrow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
