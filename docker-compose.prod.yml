name: marrow

# Production-style deployment.
# Copy .env.prod.example -> .env and fill in values, then:
#   docker compose -f docker-compose.prod.yml up -d
#
# All credentials and secrets are sourced from environment variables.
# See docs/deployment/docker-compose for the full env var reference.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-marrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-marrow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-marrow} -d ${POSTGRES_DB:-marrow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    image: ghcr.io/spmcgraw/marrow-api:${MARROW_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # API builds the DSN itself so passwords with special chars (@, :, /, etc.)
      # are URL-encoded safely. See marrow/db.py.
      POSTGRES_USER: ${POSTGRES_USER:-marrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-marrow}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      STORAGE_PATH: /data/storage
      API_KEY: ${API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    volumes:
      - api_storage:/data/storage
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-}
        NEXT_PUBLIC_OIDC_ENABLED: ${NEXT_PUBLIC_OIDC_ENABLED:-}
    image: ghcr.io/spmcgraw/marrow-web:${MARROW_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # SSR inside the docker network can't reach NEXT_PUBLIC_API_URL
      # (which is the public/browser origin). Reach the api by service name.
      INTERNAL_API_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  api_storage:
